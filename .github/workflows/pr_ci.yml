name: PR - CI
on: 
  pull_request:
    branches: [ main, release/** ]
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
jobs:
  build_test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
    name: Build & Test
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "20"
        package-manager-cache: false
    - uses: ./.github/actions/setup-dotnet
    - name: Build
      # We disable NuGet audit warnings, see https://learn.microsoft.com/en-us/nuget/reference/errors-and-warnings/nu1901-nu1904.
      # Security issues being discovered in NuGet packages we use can happen at any time, and thus all our CI builds that
      # treat warnings as errors could break anytime, without us changing the code. This prevents that. Treating them as
      # warnings and other better approaches don't work, see https://github.com/OrchardCMS/OrchardCore/pull/16317.
      run: |
        dotnet build -c Release /p:TreatWarningsAsErrors=true /p:RunAnalyzers=true /p:NuGetAudit=false
    - name: Unit Tests
      run: |
        dotnet test --project ./test/OrchardCore.Tests/OrchardCore.Tests.csproj -c Release --no-build
    - name: Cache Playwright Browsers
      if: matrix.os == 'ubuntu-24.04'
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ hashFiles('test/OrchardCore.Tests.Playwright/package.json') }}
    - name: Install Playwright Browsers
      if: matrix.os == 'ubuntu-24.04'
      run: |
        npm install -g corepack
        corepack enable
        yarn install
        yarn workspace @orchardcore/tests-playwright exec playwright install --with-deps chromium
    - name: Functional Tests - CMS
      if: matrix.os == 'ubuntu-24.04'
      run: |
        yarn workspace @orchardcore/tests-playwright test:cms
    - name: Functional Tests - MVC
      if: matrix.os == 'ubuntu-24.04'
      run: |
        yarn workspace @orchardcore/tests-playwright test:mvc
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: matrix.os == 'ubuntu-24.04' && failure()
      with:
        name: functional-test-failure
        path: |
          test/OrchardCore.Tests.Playwright/playwright-report/
          test/OrchardCore.Tests.Playwright/test-results/
          src/OrchardCore.Cms.Web/App_Data_Tests/logs
